<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="100%" height="100%">
    <defs>
        <!-- Security Grid Pattern -->
        <pattern id="grid" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
            <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1E293B" stroke-width="0.5"/>
        </pattern>

        <!-- Brand Gradients -->
        <linearGradient id="shieldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38BDF8" />
            <stop offset="100%" stop-color="#1D4ED8" />
        </linearGradient>

        <linearGradient id="promoGrad" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#F59E0B" />
            <stop offset="100%" stop-color="#EF4444" />
        </linearGradient>

        <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur stdDeviation="5" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>

        <filter id="cardShadow">
            <feDropShadow dx="0" dy="20" stdDeviation="25" flood-color="#000" flood-opacity="0.3" />
        </filter>
    </defs>

    <!-- Background -->
    <rect width="800" height="400" fill="#0F172A" rx="24"/>
    <rect width="800" height="400" fill="url(#grid)" rx="24"/>

    <!-- Glassmorphic Shield Icon -->
    <g transform="translate(100, 120)">
        <!-- Outer Glow -->
        <path d="M60 10 L110 35 V85 C110 120 60 150 60 150 C60 150 10 120 10 85 V35 L60 10Z" 
              fill="#38BDF8" opacity="0.1" filter="url(#glow)"/>
        <!-- Main Shield -->
        <path d="M60 20 L100 40 V80 C100 110 60 135 60 135 C60 135 20 110 20 80 V40 L60 20Z" 
              fill="url(#shieldGrad)" stroke="#7DD3FC" stroke-width="2"/>
        <!-- Lightning/Speed Bolt -->
        <path d="M65 45 L45 80 H65 L55 110 L75 75 H55 L65 45Z" fill="#FFFFFF" filter="url(#glow)"/>
    </g>

    <!-- Text Content -->
    <g transform="translate(260, 140)">
        <!-- Product Name -->
        <text font-family="system-ui, sans-serif" font-weight="900" font-size="64" fill="#FFFFFF" letter-spacing="-2">
            PRO <tspan fill="#38BDF8">VPN</tspan>
        </text>
        
        <!-- Subscription Length -->
        <text y="45" font-family="system-ui, sans-serif" font-weight="500" font-size="24" fill="#94A3B8" letter-spacing="4">
            12 MONTHS PLAN
        </text>

        <!-- Promo Banner -->
        <g transform="translate(0, 75)">
            <rect width="320" height="70" rx="12" fill="url(#promoGrad)" filter="url(#cardShadow)"/>
            <text x="160" y="46" text-anchor="middle" font-family="system-ui, sans-serif" 
                  font-weight="900" font-size="42" fill="#FFFFFF">
                50% OFF
            </text>
        </g>

        <!-- Trust Indicator -->
        <text y="175" font-family="system-ui, sans-serif" font-weight="600" font-size="14" fill="#4ADE80" letter-spacing="1">
            ● ENCRYPTED ● NO-LOGS ● ULTRA-FAST
        </text>
    </g>

    <!-- Decorative Corner Accents -->
    <circle cx="750" cy="50" r="80" fill="#38BDF8" opacity="0.05"/>
    <circle cx="50" cy="350" r="60" fill="#EF4444" opacity="0.05"/>
</svg>
