<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 450" width="100%" height="100%">
    <defs>
        <!-- Background Data Flow Pattern -->
        <pattern id="dataGrid" x="0" y="0" width="50" height="50" patternUnits="userSpaceOnUse">
            <circle cx="1" cy="1" r="1" fill="#1E293B" opacity="0.5"/>
            <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#1E293B" stroke-width="0.5" opacity="0.3"/>
        </pattern>

        <!-- Tech/Automation Blue Gradient -->
        <linearGradient id="techBlue" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" stop-color="#38BDF8" />
            <stop offset="100%" stop-color="#2563EB" />
        </linearGradient>

        <!-- Profit/Growth Green Gradient -->
        <linearGradient id="profitGreen" x1="0%" y1="0%" x2="100%" y2="0%">
            <stop offset="0%" stop-color="#4ADE80" />
            <stop offset="100%" stop-color="#10B981" />
        </linearGradient>

        <!-- Main Icon Glow -->
        <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
            <feGaussianBlur stdDeviation="6" result="blur" />
            <feComposite in="SourceGraphic" in2="blur" operator="over" />
        </filter>
        
        <!-- Subtle Text Shadow for Depth -->
        <filter id="textDrop">
            <feDropShadow dx="0" dy="4" stdDeviation="4" flood-color="#000" flood-opacity="0.5" />
        </filter>
    </defs>

    <!-- Canvas and Background Layer -->
    <rect width="1000" height="450" fill="#0F172A" rx="24"/>
    <rect width="1000" height="450" fill="url(#dataGrid)" rx="24"/>

    <!-- Left Side: Conceptual Icon -->
    <g transform="translate(150, 225)" filter="url(#glow)">
        <!-- Outer Hexagonal Node (Blockchain/Security) -->
        <path d="M -110 -63.5 L 0 -127 L 110 -63.5 V 63.5 L 0 127 L -110 63.5 Z" 
              fill="none" stroke="#1E3A8A" stroke-width="3" opacity="0.6"/>
        
        <!-- Inner Geometric Workings (Algorithm/Logic) -->
        <path d="M -90 -52 L 0 -104 L 90 -52 V 52 L 0 104 L -90 52 Z" 
              fill="#111827" stroke="url(#techBlue)" stroke-width="4"/>

        <!-- The "Trading Bot" Visualization -->
        <g transform="translate(-40, 20)">
            <!-- Stylized Candlestick Chart Base -->
            <rect x="0" y="-30" width="12" height="50" rx="2" fill="#1E40AF" opacity="0.5"/>
            <rect x="20" y="-50" width="12" height="70" rx="2" fill="#1E40AF" opacity="0.8"/>
            <rect x="40" y="-70" width="12" height="90" rx="2" fill="url(#techBlue)"/>
            
            <!-- Dynamic Algorithmic Rising Arrow (Execution/Profit) -->
            <path d="M 0 0 L 25 -25 L 45 -15 L 85 -65 L 85 -45 L 90 -45 L 90 -70 L 65 -70 L 65 -65 L 80 -65 L 45 -20 L 25 -30 Z" 
                  fill="url(#profitGreen)" />
            
            <!-- Central Node Point (Buy/Sell Signal) -->
            <circle cx="85" cy="-65" r="8" fill="#FFFFFF"/>
            <circle cx="85" cy="-65" r="5" fill="url(#profitGreen)"/>
        </g>
    </g>

    <!-- Right Side: Typography and Branding -->
    <g transform="translate(420, 190)" filter="url(#textDrop)">
        <!-- Main Product Title -->
        <text font-family="system-ui, sans-serif" font-weight="900" font-size="76" fill="#FFFFFF" letter-spacing="-3">
            <tspan fill="url(#techBlue)">CRYPTO</tspan> BOT KIT
        </text>
        
        <!-- Subtitle/Product Description -->
        <g transform="translate(5, 55)">
            <text font-family="system-ui, sans-serif" font-weight="300" font-size="32" fill="#94A3B8" letter-spacing="2">
                Premium Trading Scripts
            </text>
            <!-- Decorative accent line -->
            <rect x="0" y="20" width="450" height="2" fill="url(#profitGreen)" opacity="0.7"/>
        </g>

        <!-- Trust/Feature Tags -->
        <g transform="translate(0, 130)">
            <!-- Algos Pill -->
            <rect width="160" height="36" rx="18" fill="#1E3A8A"/>
            <text x="80" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="16" fill="#60A5FA" letter-spacing="1">
                ALGORITHMIC
            </text>
            
            <!-- Low Latency Pill -->
            <rect x="175" width="160" height="36" rx="18" fill="#1E3A8A"/>
            <text x="255" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="16" fill="#60A5FA" letter-spacing="1">
                LOW-LATENCY
            </text>

            <!-- Backtested Pill -->
            <rect x="350" width="140" height="36" rx="18" fill="#064E3B" stroke="#10B981" stroke-width="1"/>
            <text x="420" y="24" text-anchor="middle" font-family="system-ui, sans-serif" font-weight="700" font-size="16" fill="#4ADE80" letter-spacing="1">
                BACKTESTED
            </text>
        </g>
    </g>

    <!-- Final Corner Accents (Decorative Data Nodes) -->
    <circle cx="950" cy="50" r="3" fill="#38BDF8" opacity="0.4"/>
    <circle cx="970" cy="70" r="3" fill="#38BDF8" opacity="0.2"/>
    <circle cx="50" cy="400" r="3" fill="#10B981" opacity="0.4"/>
</svg>
